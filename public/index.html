<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/flv.js@latest/dist/flv.min.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

#video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: black;
}

#widget-overlay {
  position: absolute;
  bottom: 70px;
  left: 0;
  width: 100%;
  z-index: 9999;
  pointer-events: none;
  text-align: center;
  color: white;
}
</style>
</head>

<body>

<video id="video" controls autoplay></video>
<div id="widget-overlay"></div>

<script>
const params = new URLSearchParams(window.location.search)
const stream = params.get("url") || "http://live3.procdnlive.com/livecdn/channel80.flv?auth_key=3000001770465924-0-0-3860029accd33ced8709c37f01be2402"

if (flvjs.isSupported()) {
  const video = document.getElementById("video")

  const player = flvjs.createPlayer({
    type: "flv",
    url: "/flv?url=" + encodeURIComponent(stream),
    isLive: true,
    cors: true
  })

  player.attachMediaElement(video)
  player.load()
  player.play()

  // Auto reconnect kalau stream drop
  player.on(flvjs.Events.ERROR, (errType, errDetail) => {
    console.log("FLV error:", errType, errDetail)
    player.unload()
    player.load()
    player.play()
  })
}
</script>

</body>
</html>
